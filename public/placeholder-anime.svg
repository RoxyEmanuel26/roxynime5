<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <rect width="300" height="420" fill="url(#cardGradient)" />
  
  <g transform="translate(150, 180)" text-anchor="middle" fill="#94a3b8">
    <!-- Camera/Film Icon -->
    <rect x="-30" y="-20" width="60" height="40" rx="4" stroke="#94a3b8" stroke-width="3" fill="none" />
    <circle cx="0" cy="0" r="10" stroke="#94a3b8" stroke-width="3" fill="none" />
    <circle cx="-20" cy="-25" r="8" stroke="#94a3b8" stroke-width="3" fill="none" />
    <circle cx="20" cy="-25" r="8" stroke="#94a3b8" stroke-width="3" fill="none" />
    
    <!-- Text -->
    <text y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="1">NO IMAGE</text>
  </g>
</svg>
