<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="1280" height="720" fill="url(#bgGradient)" />
  
  <g transform="translate(640, 320)" text-anchor="middle">
    <!-- Play Icon -->
    <path d="M-25,-50 L25,-20 L-25,10 Z" fill="white" filter="url(#glow)" opacity="0.9"/>
    
    <!-- Text -->
    <text y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="bold" fill="white" letter-spacing="2" filter="url(#glow)">RoxyNime</text>
  </g>
</svg>
